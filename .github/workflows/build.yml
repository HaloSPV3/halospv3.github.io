name: Build Jekyll Site

on:
  push:
    branches: ["!main"]
  workflow_dispatch:
  pull_request:
    types: 
      synchronize

concurrency:
  group: "pages"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/workflows/_build/
